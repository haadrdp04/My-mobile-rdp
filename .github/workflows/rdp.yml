name: Windows-Mobile-RDP-Tailscale
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Download Tailscale Installer
      run: |
        Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "tailscale-setup.exe"
    - name: Install Tailscale
      run: |
        Start-Process -FilePath "tailscale-setup.exe" -ArgumentList "/quiet", "/norestart" -Wait
    - name: Connect to Tailscale Network
      run: |
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname="github-rdp"
    - name: Display IP Address
      run: |
        & "C:\Program Files\Tailscale\tailscale.exe" ip -4
    - name: Configure Secure Password
      run: |
        net user runneradmin MobileRDPPassword123!
    - name: Activate Windows RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
    - name: Keep Server Alive
      run: |
        Start-Sleep -Seconds 21600
        
