name: Windows-Mobile-RDP
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Download Ngrok
      run: |
        Invoke-WebRequest -Uri "equinox.io" -OutFile "ngrok.zip"
        Expand-Archive ngrok.zip -DestinationPath .
    - name: Create Ngrok Configuration File
      run: |
        $config = @"
        version: "3"
        agent:
          authtoken: "${{ secrets.NGROK_AUTH_TOKEN }}"
        tunnels:
          rdp:
            proto: tcp
            addr: 3389
            region: ap
        "@
        Set-Content -Path "ngrok.yml" -Value $config
    - name: Configure Secure Password
      run: |
        net user runneradmin MobileRDPPassword123!
    - name: Activate Windows RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
    - name: Start Tunnel Engine
      run: |
        Start-Process ./ngrok.exe -ArgumentList "start --all --config ngrok.yml"
        Start-Sleep -Seconds 21600
        
